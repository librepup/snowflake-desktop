# Old Picom
transition = false;
transition-length = 0
transition-pow-x = 0.1
transition-pow-y = 0.1
transition-pow-w = 0.1
transition-pow-h = 0.1
size-transition = true

# Shadow
shadow = true;
shadow-radius = 16;
shadow-opacity = .5;
shadow-offset-x = -7;
shadow-offset-y = -7;
shadow-ignore-shaped = false;
shadow-exclude = [
  "_NET_WM_STATE@:32a *= '_NET_WM_STATE_HIDDEN'",
  "_GTK_FRAME_EXTENTS@:c",
  "name *= 'compton'",
  "name *= 'picom'",
  "class_g = 'Polybar'",
  "class_g = 'geex-bar'",
  "name = 'Notification'",
  "class_g = 'Conky'",
  "class_g = 'Kupfer'",
  "class_g = 'Synapse'",
  "class_g ?= 'Notify-osd'",
  "class_g ?= 'Cairo-dock'",
	"class_g = 'Cairo-clock'",
  "class_g ?= 'Xfce4-notifyd'",
  "name = 'osu!'"
];

# Other
xrender-sync-fence = true;
fading = false;
no-fading-openclose = false;
fade-in-step = 0.05;
fade-out-step = 0.05;
fade-delta = 10;
fade-exclude = [
  "class_g = 'slop'",
  "window_type = 'desktop'",
  "window_type = 'dock'",
  "_NET_WM_STATE@:32a *= '_NET_WM_STATE_HIDDEN'",
  "class_g = 'xmonad-decoration'",
  "class_g = 'xmonad'",
  "name = 'osu!'"
]
inactive-opacity = 1.0;
frame-opacity = 0.7;
menu-opacity = 1.0
popup_menu = { opacity = 0.8; }
dropdown_menu = { opacity = 0.8; }
inactive-opacity-override = false;
active-opacity = 1.0;
inactive-dim = 0.2;
focus-exclude = [
  "class_g = 'Cairo-clock'",
  "class_g = 'Bar'",
  "class_g = 'slop'",
  "class_g = 'xmonad-decoration'",
  "class_g = 'xmonad'",
  "_NET_WM_STATE@:32a *= '_NET_WM_STATE_HIDDEN'",
  "name = 'osu!'"
];

# Blur
opacity-rule = [
  "80:class_g     = 'Bar'",
  "100:class_g    = 'slop'",
  "100:class_g    = 'XTerm'",
  "100:class_g    = 'URxvt'",
  "100:class_g     = 'Polybar'",
  "100:class_g    = 'code-oss'",
  "100:class_g    = 'Meld'",
  "95:class_g     = 'TelegramDesktop'",
  "95:class_g     = 'jetbrains-clion'",
  "95:class_g     = 'discord'",
  "90:class_g     = 'Joplin'",
  "100:class_g    = 'firefox'",
  "100:class_g    = 'Thunderbird'",
  "80:class_g = 'Alacritty'",
  "80:class_g = 'Emacs'",
  "90:class_g = 'kitty'",
  "70:class_g = 'dmenu'"
];
blur: {
  method = "dual_kawase";
  strength = 5;
  deviation = 0.0;
  kernel = "11x11gaussian";
  background = false;
  background-frame = false;
  background-fixed = false;
  kern = "3x3box";
}
blur-background-exclude = [
  "class_g = 'slop'",
  "_GTK_FRAME_EXTENTS@",
  "class_g = 'xmonad-decoration'",
  "class_g = 'xmonad'",
  "name = 'osu!'"
];


# New Picom
animations = true;
animation-mass = 1;
animation-stiffness = 300.0;
animation-dampening = 30.0;
animation-clamping = false;
animation-for-open-window = "zoom";
animation-for-unmap-window = "zoom";
animation-for-menu-window = "slide-down";
animation-for-transient-window = "slide-down";
shadow = true;
shadow-radius = 12;
shadow-offset-x = -7;
shadow-offset-y = -6;
shadow-opacity = 1
shadow-exclude = [
  "class_g ?= 'xmonad-prompt'",
  "name = 'xmonad-prompt'",
  "class_g = 'xmonad-decoration'",
  "class_g = 'xmonad'",
  "name = 'osu!'"
]
unredir-if-possible = true
vsync = false;
inactive-opacity = 1.0;
frame-opacity = 1.0;
inactive-opacity-override = false;
focus-exclude = [ "class_g = 'Cairo-clock'" ];
backend = "glx"
glx-no-rebind-pixmap = true;
dithered-present = false;
mark-wmwin-focused = true;
mark-ovredir-focused = true;
detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient = true;
no-use-damage = true;
use-damage = false;
force-win-blend = false;
no-ewmh-fullscreen = false;
log-level = "warn";

# WinTypes
wintypes:
{
  normal = { fade = false; shadow = true; }
  tooltip = { fade = true; shadow = true; opacity = 0.75; focus = true; full-shadow = false; };
  dock = { shadow = false; }
  dnd = { shadow = false; }
  popup_menu = { opacity = 0.8; }
  dropdown_menu = { opacity = 0.8; }
};

# Corners and Borders
corner-radius = 10;
round-borders = 1;
rounded-corners-exclude = [
  "class_g = 'Polybar'",
  "class_g = 'dwm'",
  "class_g = 'xmonad-decoration'",
  "class_g = 'xmonad'",
  "class_g = 'eww'",
  "class_g = 'Eww'",
  "class_g = 'dmenu'"
];
