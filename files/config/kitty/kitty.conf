###########################
### Kitty Configuration ###
###########################
### General Settings
hide_window_decorations no
enable_audio_bell no
confirm_os_window_close 0
scrollback_lines -1
scrollback_pager ~/.config/kitty/scripts/emacsPager.sh
shell /run/current-system/sw/bin/zsh
allow_remote_control yes
window_padding_width 3

### Background Image
#background_image ~/Pictures/Wallpapers/dangerousFilian.png
background_image_layout cscaled
background_tint 0.95

### Window
remember_window_size no
initial_window_width 866
initial_window_height 432

### Colors
## General
foreground   #f5e8d5
background   #0a0a05
cursor       #f5e8d5
## Base 16
color0       #0a0a05
color8       #8a7a6e
color1       #4CBF5A
color9       #4CBF5A
color2       #D4921A
color10      #D4921A
color3       #C23FAD
color11      #C23FAD
color4       #78BADC
color12      #78BADC
color5       #F04535
color13      #F04535
color6       #FF6040
color14      #FF6040
color7       #f5e8d5
color15      #f5e8d5

### Cursor
cursor_shape beam
cursor_blink_interval 0
cursor_beam_thickness 1.54
cursor_trail 200
cursor_trail_decay 0.1 0.4
wheel_scroll_multiplier 10

### Font
font_family TempleOS
font_size 11
modify_font cell_width 80%

### Tabs
## General
tab_bar_style custom
tab_separator ""
tab_bar_min_tabs 2
tab_bar_edge top
## Templates
tab_title_template "{fmt.fg._0a0a05}{fmt.bg._0a0a05}{fmt.fg._f5e8d5}{fmt.bg._0a0a05} {index}: {title} {fmt.fg._0a0a05}{fmt.bg._0a0a05} "
active_tab_title_template "{fmt.fg._f5e8d5}{fmt.bg._0a0a05}{fmt.fg._0a0a05}{fmt.bg._f5e8d5} {index}: {title} {fmt.fg._f5e8d5}{fmt.bg._0a0a05}{fmt.bg._0a0a05}"
active_tab_font_style bold
## Colors
active_tab_foreground   #f5e8d5
active_tab_background   #0a0a05
inactive_tab_foreground #f5e8d5
inactive_tab_background #0a0a05
tab_bar_background      #0a0a05

### Keybinds
clear_all_shortcuts yes
kitty_mod ctrl+shift
## Clipboard
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard
## General
map ctrl+q quit
map ctrl+h debug_config
map ctrl+shift+e show_kitty_env_vars
map ctrl+shift+r load_config_file
map ctrl+shift+d debug_config
## Text Navigation
map ctrl+a send_text all \x01
map ctrl+e send_text all \x05
map ctrl+left send_text all \x1b\x62
map ctrl+right send_text all \x1b\x66
## Tabs
map ctrl+shift+1 goto_tab 1
map ctrl+shift+2 goto_tab 2
map ctrl+shift+3 goto_tab 3
map ctrl+shift+4 goto_tab 4
map ctrl+shift+5 goto_tab 5
map ctrl+shift+6 goto_tab 6
map ctrl+shift+7 goto_tab 7
map ctrl+shift+8 goto_tab 8
map ctrl+shift+9 goto_tab 9
map ctrl+tab next_tab
map ctrl+shift+tab previous_tab
map ctrl+shift+t new_tab
map ctrl+shift+w close_tab
map ctrl+shift+page_up move_tab_backward
map ctrl+shift+page_down move_tab_forward
## Commands
map ctrl+l combine : clear_terminal scroll active : send_text all \x15
map ctrl+shift+l send_text normal,application l\r
map ctrl+o send_text normal,application sh -c 'file=$(kitten choose-files); [ -n "$file" ] && kitty @ send-text --match id:$KITTY_WINDOW_ID "$file"; clear'\r
## Scrolling
map ctrl+shift+up scroll_line_up
map ctrl+shift+down scroll_line_down
map ctrl+shift+h show_scrollback
## Tools
map ctrl+shift+i kitten unicode_input --tab name
map ctrl+shift+a>f1 show_kitty_doc overview
## Layouts
map ctrl+shift+space next_layout
map ctrl+shift+a>n new_window
map ctrl+shift+a>c close_window
map ctrl+[ layout_action decrease_num_full_size_windows
map ctrl+] layout_action increase_num_full_size_windows
map ctrl+shift+a>left neighboring_window left
map ctrl+shift+a>right neighboring_window right
map ctrl+shift+a>up neighboring_window up
map ctrl+shift+a>down neighboring_window down
map ctrl+shift+a>ctrl+shift+up move_window up
map ctrl+shift+a>ctrl+shift+left move_window left
map ctrl+shift+a>ctrl+shift+right move_window right
map ctrl+shift+a>ctrl+shift+down move_window down
map ctrl+shift+right resize_window narrower
map ctrl+shift+left resize_window wider
map ctrl+shift+up resize_window taller
map ctrl+shift+down resize_window shorter 3
map ctrl+shift+a>home resize_window reset
map ctrl+shift+a>x close_other_windows_in_tab
map ctrl+shift+a>f11 toggle_fullscreen
## Font
map ctrl+shift+equal change_font_size all +1.0
map ctrl+shift+minus change_font_size all -1.0
map ctrl+shift+backslash change_font_size all 0
map ctrl+shift+a>equal change_font_size all +1.0
map ctrl+shift+a>minus change_font_size all -1.0
map ctrl+shift+a>backslash change_font_size all 0

### User Config
include ~/.config/kitty/user.conf
